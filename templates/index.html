<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wantedly 記事自動投稿</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
        .card { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .hint { color: #888; font-size: 0.8rem; margin-bottom: 0.5rem; }
        input[type="file"] { width: 100%; padding: 0.8rem; border: 2px dashed #ddd; border-radius: 8px; background: #fafafa; cursor: pointer; }
        input[type="file"]:hover { border-color: #4a90d9; background: #f0f6ff; }
        .btn { display: inline-block; padding: 0.8rem 2rem; background: #4a90d9; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { background: #357abd; }
        .flash { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .flash.success { background: #e8f5e9; color: #2e7d32; }
        .flash.error { background: #fce4ec; color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wantedly 記事自動投稿</h1>
        <p class="subtitle">記事原稿と写真をアップロードするだけで、Wantedlyストーリーに下書き投稿されます。</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash {% if '完了' in message or '投稿しました' in message %}success{% else %}error{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="card">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>記事原稿</label>
                    <p class="hint">対応形式: .docx / .txt / .md</p>
                    <input type="file" name="article" accept=".docx,.txt,.md" required>
                </div>

                <div class="form-group">
                    <label>写真（複数選択可）</label>
                    <p class="hint">対応形式: .jpg / .png / .webp（5枚程度推奨）</p>
                    <input type="file" name="images" accept="image/*" multiple required>
                </div>

                <button type="submit" class="btn">プレビューへ進む</button>
            </form>
        </div>
    </div>
</body>
</html>
